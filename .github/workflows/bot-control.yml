name: 🤖 Control del Bot

on:
  workflow_dispatch:
    inputs:
      action:
        description: "¿Qué quieres hacer con el bot?"
        required: true
        default: "redeploy"
        type: choice
        options:
          - redeploy
          - restart

jobs:
  control:
    name: Controlar Bot en Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy bot (sube nuevo código)
        if: ${{ github.event.inputs.action == 'redeploy' }}
        run: railway up --service ca622ead-b524-4296-9a6a-59a33b6b38a5 --environment 70546448-a18d-471a-aec0-05206d08d502 --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Restart bot (reinicia sin cambios)
        if: ${{ github.event.inputs.action == 'restart' }}
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"ca622ead-b524-4296-9a6a-59a33b6b38a5\", environmentId: \"70546448-a18d-471a-aec0-05206d08d502\") }"}'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
